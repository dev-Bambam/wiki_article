name: wikipedia_reader
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  device_preview_plus: ^2.7.2
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2

flutter:
  uses-material-design: true
  fonts:
    - family: TikTokSans
      fonts:
        - asset: lib/assets/fonts/TikTok_Sans/static/TikTokSans-Regular.ttf
        - asset: lib/assets/fonts/TikTok_Sans/static/TikTokSans-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/TikTok_Sans/static/TikTokSans-SemiBold.ttf
          weight: 600
        - asset: lib/assets/fonts/TikTok_Sans/static/TikTokSans-Bold.ttf
          weight: 700
